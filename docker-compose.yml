services:
  # ──────────────────────────────────────────────
  # A1: IoT Ingestion Service
  # ──────────────────────────────────────────────
  iot-ingestion:
    build:
      context: ./services/iot_ingestion
      dockerfile: Dockerfile
    container_name: smart-campus-iot-ingestion
    env_file: .env
    ports:
      - "${IOT_INGESTION_PORT:-8001}:8000"
    volumes:
      - ./Datas:/app/data
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

