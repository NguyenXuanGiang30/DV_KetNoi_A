openapi: 3.1.0
info:
  title: Smart Campus — Notification API
  version: 1.0.0
  description: |
    Dịch vụ gửi cảnh báo đa kênh.
    - Cặp 4: Core Business gọi POST /api/v1/notifications
servers:
  - url: http://localhost:8007
    description: Local dev
tags:
  - name: notifications
  - name: system
security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [system]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/notifications:
    post:
      tags: [notifications]
      operationId: createNotification
      summary: Gửi cảnh báo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRequest"
      responses:
        "201":
          description: Đã gửi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"

  /api/v1/notifications/recent:
    get:
      tags: [notifications]
      operationId: getRecentNotifications
      summary: Danh sách thông báo gần đây
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationItem"
                  total:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        time:
          type: string

    NotificationRequest:
      type: object
      required: [source_service, alert_type, severity, message]
      properties:
        source_service:
          type: string
        alert_type:
          type: string
        severity:
          type: string
        message:
          type: string
        related_event_id:
          type: string
        channels:
          type: array
          items:
            type: string

    NotificationResponse:
      type: object
      properties:
        notification_id:
          type: string
        status:
          type: string
        channels_sent:
          type: array
          items:
            type: string
        created_at:
          type: string

    NotificationItem:
      type: object
      properties:
        notification_id:
          type: string
        source_service:
          type: string
        alert_type:
          type: string
        severity:
          type: string
        message:
          type: string
        status:
          type: string
        channels_sent:
          type: array
          items:
            type: string
        created_at:
          type: string
