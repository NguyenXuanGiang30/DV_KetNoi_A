openapi: 3.1.0
info:
  title: Smart Campus — Camera Stream API
  version: 1.0.0
  description: Dịch vụ xử lý luồng camera, phát hiện chuyển động.
servers:
  - url: http://localhost:8002
tags:
  - name: camera
  - name: system
security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [system]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/camera/status:
    get:
      tags: [camera]
      operationId: getCameraStatus
      summary: Trạng thái camera
      responses:
        "200":
          description: OK

  /api/v1/detections/recent:
    get:
      tags: [camera]
      operationId: getRecentDetections
      summary: Kết quả nhận diện gần đây
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        time:
          type: string
        stream_connected:
          type: boolean
        motion_triggers:
          type: integer
